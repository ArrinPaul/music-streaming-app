<app-navbar></app-navbar>

<div class="app-ambience" aria-hidden="true">
  <span class="orb orb--teal"></span>
  <span class="orb orb--pink"></span>
  <span class="orb orb--mint"></span>
</div>

<div class="grain-overlay" aria-hidden="true"></div>

<main class="app-container">
  <router-outlet></router-outlet>
</main>

<section class="mini-player" *ngIf="audioService.getState().currentSong as song">
  <div class="mini-player__left">
    <img [src]="song.coverImageUrl" [alt]="song.title">
    <div>
      <p class="mini-player__now">Now Playing</p>
      <strong>{{ song.title }}</strong>
      <span>{{ song.artistName }}</span>
    </div>
  </div>

  <div class="mini-player__controls">
    <button mat-icon-button (click)="audioService.playPrevious()" aria-label="Previous">
      <mat-icon>skip_previous</mat-icon>
    </button>
    <button mat-mini-fab color="primary" (click)="audioService.togglePlayPause()" aria-label="Play or pause">
      <mat-icon>{{ isPlaying ? 'pause' : 'play_arrow' }}</mat-icon>
    </button>
    <button mat-icon-button (click)="audioService.playNext()" aria-label="Next">
      <mat-icon>skip_next</mat-icon>
    </button>
  </div>

  <a class="mini-player__open" mat-button routerLink="/now-playing">
    Open Player
    <mat-icon>open_in_new</mat-icon>
  </a>
</section>
