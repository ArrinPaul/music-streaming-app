<mat-toolbar class="navbar">
  <div class="navbar-container">
    <a class="navbar-brand" routerLink="/home" aria-label="MusicStream home">
      <mat-icon class="logo-icon">graphic_eq</mat-icon>
      <span class="brand-name">MusicStream</span>
    </a>

    <div class="search-shell" (focusout)="closeSearchResults()">
      <mat-form-field appearance="outline" class="global-search">
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange()"
          (focus)="onSearchFocus()"
          (keyup.enter)="goToSearchPage()"
          placeholder="Search tracks, artists, and albums">
        <button
          *ngIf="searchQuery"
          matSuffix
          mat-icon-button
          aria-label="Clear search"
          (click)="searchQuery=''; onSearchChange()">
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>

      <div class="search-results" *ngIf="showSearchResults">
        <button class="result-item" *ngFor="let song of searchResults" (click)="selectSong(song)">
          <img [src]="song.coverImageUrl" [alt]="song.title">
          <span class="result-meta">
            <strong>{{ song.title }}</strong>
            <small>{{ song.artistName }} • {{ song.albumName }}</small>
          </span>
          <mat-icon>play_arrow</mat-icon>
        </button>
      </div>
    </div>

    <nav class="navbar-menu">
      <a mat-button routerLink="/home" routerLinkActive="active"><mat-icon>home</mat-icon><span>Home</span></a>
      <a mat-button routerLink="/songs" routerLinkActive="active"><mat-icon>library_music</mat-icon><span>Tracks</span></a>
      <a mat-button routerLink="/artists" routerLinkActive="active"><mat-icon>podcasts</mat-icon><span>Artists</span></a>
      <a mat-button routerLink="/playlists" routerLinkActive="active"><mat-icon>queue_music</mat-icon><span>Playlists</span></a>
      <a mat-button routerLink="/now-playing" routerLinkActive="active"><mat-icon>play_circle</mat-icon><span>Player</span></a>
    </nav>

    <div class="navbar-actions">
      <button mat-icon-button matTooltip="Quick feedback" routerLink="/feedback">
        <mat-icon>rate_review</mat-icon>
      </button>

      <button mat-icon-button (click)="toggleTheme()" matTooltip="Toggle theme">
        <mat-icon>{{ currentTheme === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="User menu">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="user-info" mat-menu-item disabled>
          <div *ngIf="currentUser$ | async as user">
            <div class="user-name">{{ user.displayName || user.username }}</div>
            <div class="user-email">{{ user.email }}</div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/login"><mat-icon>login</mat-icon>Sign In</button>
        <button mat-menu-item routerLink="/feedback"><mat-icon>feedback</mat-icon>Give Feedback</button>
        <button mat-menu-item><mat-icon>settings</mat-icon>Settings</button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>
